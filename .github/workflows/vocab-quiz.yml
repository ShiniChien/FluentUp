name: Vocab Quiz

on:
  schedule:
    # 7:00, 13:00, 19:00, 01:00 ICT (UTC+7) = 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  send-quiz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-quiz.txt

      - name: Run vocab quiz script
        env:
          MONGODB_URI: "MONGODB_URI_PLACEHOLDER"
          MONGODB_USERNAME: "MONGODB_USERNAME_PLACEHOLDER"
          MONGODB_PASSWORD: "MONGODB_PASSWORD_PLACEHOLDER"
          GOOGLE_SERVICE_ACCOUNT_KEY_FILE: "credentials/shinichien-0bc21ed9f8c7.json"
          DISCORD_WEBHOOK_URL: "DISCORD_WEBHOOK_PLACEHOLDER"
        run: python scripts/vocab_quiz.py
