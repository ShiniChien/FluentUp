</style>
</head>
<body>
<h2>📚 Vocabulary Quiz — shinichien</h2>
<p style="color:#666">2026:05:09 15:14</p>
<div id="score"></div>
<div id="questions">

</div>
<div class="q" data-correct="kẻ săn mồi" style="margin:16px 0;padding:12px;border:1px solid #ddd;border-radius:6px">

</div>

  <p style="margin:0 0 8px;font-weight:bold">3. nhà điểu học</p>
  <div><label style="display:block;margin:4px 0"><input type="radio" name="q2" class="ans" value="predators"> predators</label><label style="display:block;margin:4px 0"><input type="radio" name="q2" class="ans" value="litter"> litter</label><label style="display:block;margin:4px 0"><input type="radio" name="q2" class="ans" value="anomaly"> anomaly</label><label style="display:block;margin:4px 0"><input type="radio" name="q2" class="ans" value="ornithlogist"> ornithlogist</label></div>

  <p class="feedback" style="margin:6px 0 0;display:none"></p>
</div></div>
<br>
<button onclick="submitQuiz()">Nộp bài</button>
<script>
function submitQuiz(){
  var qs=document.querySelectorAll('.q');
  var correct=0;
  qs.forEach(function(q){
    var expected=q.dataset.correct.trim().toLowerCase();
    var input=q.querySelector('input[type="text"]');
    var ans='';
    if(input){ans=input.value.trim().toLowerCase();}
    else{var r=q.querySelector('input[type="radio"]:checked');ans=r?r.value.trim().toLowerCase():'';}
    var fb=q.querySelector('.feedback');
    fb.style.display='block';
    if(ans===expected){q.classList.add('correct');correct++;fb.textContent='✓ Correct';fb.style.color='green';}
    else{q.classList.add('wrong');fb.textContent='✗ Đáp án: '+q.dataset.correct;fb.style.color='red';}
  });
  var sc=document.getElementById('score');
  sc.style.display='block';
  sc.textContent='Score: '+correct+'/'+qs.length;
  sc.style.background=correct===qs.length?'#d4edda':'#fff3cd';
  sc.scrollIntoView();
}
</script>
</body>
</html>
